<header
  class="sticky top-0 z-10 border-b border-neutral-300 bg-(--ds-color-neutral-background-default)"
>
  <div class="mx-auto flex max-w-screen-2xl items-center justify-between p-4">
    <a routerLink="/" class="flex items-center gap-2">
      <hvi-logo company="dots" size="sm" aria-hidden="true" />
      Hviktor Angular
    </a>
    <button
      hviButton
      variant="tertiary"
      color="accent"
      (click)="themeService.toggleColorScheme()"
      [title]="'Bytt til ' + themeService.getNextSchemeLabel() + ' modus'"
    >
      <span>{{ themeService.getNextSchemeIcon() }}</span>
      <span class="hidden sm:inline">{{ themeService.getNextSchemeLabel() }}</span>
    </button>
  </div>
</header>

<div class="mx-auto min-h-screen max-w-screen-2xl lg:flex">
  <aside
    class="border-b border-neutral-300 bg-(--ds-color-neutral-background-default) lg:sticky lg:top-20 lg:h-[calc(100vh-80px)] lg:w-60 lg:shrink-0 lg:overflow-y-auto lg:border-r lg:border-b-0"
  >
    <nav>
      <p class="hidden font-medium lg:block lg:px-4 lg:pt-4">Komponenter</p>
      <ul class="m-0 flex list-none gap-1 overflow-x-auto p-3 pb-4 lg:block lg:px-4 lg:pb-8">
        @for (component of components; track component.id) {
        <li class="shrink-0 lg:mb-1">
          <a
            [routerLink]="['/komponenter', component.id]"
            routerLinkActive="font-semibold border-l-4 lg:border-l-6 bg-(--ds-color-neutral-surface-tinted)"
            class="flex items-center gap-1.5 rounded px-3 py-2 whitespace-nowrap transition-colors hover:bg-(--ds-color-neutral-surface-hover) active:bg-(--ds-color-neutral-surface-active)"
          >
            {{ component.name }} @if (component.unitTested && component.e2eTested) {
            <span
              class="ml-auto text-xs text-green-700"
              title="Enhetstester og E2E-tester bestått"
              aria-label="Enhetstester og E2E-tester bestått"
              >✓</span
            >
            }
          </a>
        </li>
        }
      </ul>
    </nav>
  </aside>
  <main class="min-w-0 flex-1 p-4 sm:p-6 lg:p-10">
    <router-outlet />
  </main>
</div>
