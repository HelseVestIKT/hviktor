<header
  class="sticky top-0 z-10 flex items-center justify-between border-b border-neutral-300 bg-(--ds-color-neutral-background-default) p-4"
>
  <a routerLink="/" hviLink class="flex items-center gap-2">
    <hvi-logo company="dots" size="sm" />
    Hviktor Angular
  </a>
  <button
    hviButton
    variant="tertiary"
    color="accent"
    (click)="themeService.toggleColorScheme()"
    [title]="'Bytt til ' + themeService.getNextSchemeLabel() + ' modus'"
  >
    <span>{{ themeService.getNextSchemeIcon() }}</span>
    <span class="hidden sm:inline">{{ themeService.getNextSchemeLabel() }}</span>
  </button>
</header>

<div class="min-h-screen lg:flex">
  <aside
    class="border-b border-neutral-300 bg-(--ds-color-neutral-background-default) lg:fixed lg:top-20 lg:h-[calc(100vh-100px)] lg:w-60 lg:overflow-y-auto lg:border-r lg:border-b-0"
  >
    <nav>
      <ul class="m-0 flex list-none gap-1 overflow-x-auto p-3 pb-4 lg:block lg:p-4 lg:pb-8">
        <p class="hidden font-medium lg:block">Komponenter</p>
        @for (component of components; track component.id) {
        <li class="shrink-0 lg:mb-1">
          <a
            [routerLink]="['/komponenter', component.id]"
            routerLinkActive="font-semibold border-l-4 lg:border-l-6 bg-(--ds-color-neutral-surface-tinted)"
            class="block rounded px-3 py-2 whitespace-nowrap transition-colors hover:bg-(--ds-color-neutral-surface-hover) active:bg-(--ds-color-neutral-surface-active)"
          >
            {{ component.name }}
          </a>
        </li>
        }
      </ul>
    </nav>
  </aside>
  <main class="flex-1 p-4 sm:p-6 lg:ml-60 lg:p-10">
    <router-outlet />
  </main>
</div>
