<header class="border-b border-neutral-300 p-4">
  <a routerLink="/" class="font-medium"> Hviktor Angular </a>
</header>

<div class="flex min-h-screen">
  <aside class="fixed h-screen w-50 overflow-y-auto border-r border-neutral-300">
    <nav>
      <ul class="m-0 list-none p-4">
        <p class="font-medium">Komponenter</p>
        @for (component of components; track component.id) {
        <li>
          <a
            [routerLink]="['/komponenter', component.id]"
            routerLinkActive="active"
            class="block rounded px-1 py-0.5 hover:bg-neutral-50 hover:underline"
          >
            {{ component.name }}
          </a>
        </li>
        }
      </ul>
    </nav>
  </aside>
  <main class="ml-50 max-w-[calc(100%-240px)] flex-1 p-10">
    <router-outlet />
  </main>
</div>
