# Workflow som logger på azure med oidc og kjører en bicep-fil som konfigurerer azure-ressurser

name: Azure Environment Configuration Workflow
on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      webapp-name:
        required: true
        type: string
      artifact-name:
        required: true
        type: string


jobs:
  configure-azure:
    runs-on: HVI-SKY-TJENESTER-RUNNER  
    environment: ${{inputs.environment}}
    steps:
    - uses: actions/checkout@v4
    # Må bruke if-statement for å kunne logge på riktig subscription basert på input-parameter. Eneste måten jeg har funnet så langt.
    # Prøvde med legge ting i en egen workflow som slo sammen navn med miljø og prøvd å hente ut secrets, men det var nytteløst. 
    # Duplisering må dessverre brukes om ikke vi finner på noe lurt
    - name: DEV environment login    
      if: ${{inputs.environment == 'DEV'}}      
      uses: azure/login@v1
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID_DEV}}
        tenant-id: ${{ secrets.AZURE_TENANT_ID_DEV }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID_DEV }}

    - name: QA environment login
      if: ${{inputs.environment == 'QA'}}      
      uses: azure/login@v1
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID_QA}}
        tenant-id: ${{ secrets.AZURE_TENANT_ID_QA }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID_QA }}
          
    - name: PROD environment login
      if: ${{inputs.environment == 'PROD'}}      
      uses: azure/login@v1
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID_PROD}}
        tenant-id: ${{ secrets.AZURE_TENANT_ID_PROD }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID_PROD }}
  


    # Dette gjøres for å sikre at vi har en resource group å jobbe med. Den må være på plass før kjøring av bicep-filen under resourcegroup-scope. 
    # Kan være aktuelt å kjøre en egen bicep for å opprette resource group og deretter kjøre bicep for innhold. Den må da kjøres under subscription-scope og ikke resourcegroup
    - uses: azure/cli@v2
      with:
        inlineScript:        
          #!/bin/bash
          az group create --name 'HVI-UTV-${{inputs.environment}}-Hviktor-GH-rg' --location norwayeast          
        
      
    - uses: azure/arm-deploy@v2
      with:
        template: '.github/workflows/bicep/azure-config.bicep'
        parameters: '.github/workflows/bicep/azure-config.${{inputs.environment}}.parameters.json'
        deploymentMode: 'Complete' # Complete fungerer bare med scope resourcegroup og ikke subscription. Incremental fungerer med subscription og resourcegroup
        scope: 'resourcegroup'
        resourceGroupName: 'HVI-UTV-${{inputs.environment}}-Hviktor-GH-rg' #kun for subscription
        failOnStdErr: false
        #region: 'norwayeast'
        


    - name: Download artifact from build job
      uses: actions/download-artifact@v4
      with:
        name: ${{ inputs.artifact-name }}

    - name: Deploy webapp
      uses: azure/webapps-deploy@v3
      with:
        app-name: ${{ inputs.webapp-name }}
        package: './'

