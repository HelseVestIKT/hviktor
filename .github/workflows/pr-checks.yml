# Kjører lint, test og build på biblioteket ved pull requests til main

name: PR Quality Gate

permissions:
  contents: read
  pull-requests: read


on:
    pull_request:
        branches: [main]
        types: [opened, synchronize, reopened]

defaults:
    run:
        working-directory: hviktor-angular

jobs:
    quality:
        name: Lint, Test & Build
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"
                  cache-dependency-path: "hviktor-angular/package-lock.json"

            - name: Install dependencies
              run: npm ci

            - name: Lint library
              run: npx eslint projects/hviktor --ext .ts,.html

            - name: Run tests
              run: npm run test -- --project hviktor --watch=false

            - name: Build library
              run: npm run build:lib
