on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

build-and-deploy:
    runs-on: [self-hosted-windows]
    steps:

    - name: Azure Login
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID_DEV }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID_DEV }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID_DEV }}

    - name: Azure CLI script
      uses: azure/cli@v2
      with:
        azcliversion: latest
        inlineScript: |
          az account show
          az storage -h