name: Deploy demo app to GitHub Pages

on:
    push:
        branches: ["main"]
    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: "pages"
    cancel-in-progress: false

jobs:
    build:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: hviktor-angular
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: "20.x"
                  cache: "npm"
                  cache-dependency-path: "hviktor-angular/package-lock.json"

            - name: Install dependencies
              run: npm ci --ignore-scripts

            - name: Build library
              run: npx ng build hviktor --configuration production

            - name: Build Angular app
              run: npx ng build --configuration production --base-href ./

            - name: Copy index.html to 404.html (SPA routing)
              run: cp dist/hviktor-angular/browser/index.html dist/hviktor-angular/browser/404.html

            - name: Setup Pages
              uses: actions/configure-pages@v5

            - name: Upload artifact
              uses: actions/upload-pages-artifact@v3
              with:
                  path: "hviktor-angular/dist/hviktor-angular/browser"

    deploy:
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        runs-on: ubuntu-latest
        needs: build
        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
