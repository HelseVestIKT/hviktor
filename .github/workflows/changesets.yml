# Oppretter en "Version Packages" PR når det finnes changesets på main.
# Når PR-en merges, kjøres release-scriptet som tagger og trigger publisering.

name: Changesets

on:
    push:
        branches: [main]

defaults:
    run:
        working-directory: hviktor-angular

permissions:
    contents: write
    pull-requests: write

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    changesets:
        name: Version Packages
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"
                  cache-dependency-path: "hviktor-angular/package-lock.json"

            - name: Install dependencies
              run: npm ci

            - name: Setup git user
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
              working-directory: .

            - name: Check for changesets
              id: check
              run: |
                  # Sjekk om det finnes changeset-filer (ikke config.json/README.md)
                  CHANGESETS=$(find .changeset -name '*.md' ! -name 'README.md' 2>/dev/null | head -1)
                  if [ -n "$CHANGESETS" ]; then
                    echo "has_changesets=true" >> $GITHUB_OUTPUT
                  else
                    echo "has_changesets=false" >> $GITHUB_OUTPUT
                  fi

            - name: Version packages
              if: steps.check.outputs.has_changesets == 'true'
              run: npm run changeset:version

            - name: Create Release PR
              if: steps.check.outputs.has_changesets == 'true'
              uses: peter-evans/create-pull-request@v7
              with:
                  title: "chore: version packages"
                  commit-message: "chore: version packages"
                  branch: changeset-release/main
                  body: |
                      This PR was opened by the Changesets workflow.
                      When merged, a git tag will be created and the package will be published to npm.

            - name: Tag and trigger publish
              if: steps.check.outputs.has_changesets == 'false'
              run: npm run changeset:tag
