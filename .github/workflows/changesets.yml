# Oppretter en "Version Packages" PR når det finnes changesets på main.
# Når PR-en merges, bygges og publiseres pakken til npm.

name: Changesets

on:
    push:
        branches: [main]

permissions:
    contents: write
    pull-requests: write
    id-token: write

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    # Jobb 1: Sjekk status og opprett PR hvis det finnes changesets
    check:
        name: Check Changesets
        runs-on: ubuntu-latest
        outputs:
            has_changesets: ${{ steps.check.outputs.has_changesets }}

        defaults:
            run:
                working-directory: hviktor-angular

        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"
                  cache-dependency-path: "hviktor-angular/package-lock.json"

            - name: Install dependencies
              run: npm ci

            - name: Check for changesets
              id: check
              run: |
                  CHANGESETS=$(find .changeset -name '*.md' ! -name 'README.md' 2>/dev/null | head -1)
                  if [ -n "$CHANGESETS" ]; then
                    echo "has_changesets=true" >> $GITHUB_OUTPUT
                  else
                    echo "has_changesets=false" >> $GITHUB_OUTPUT
                  fi

            - name: Version packages
              if: steps.check.outputs.has_changesets == 'true'
              run: npm run changeset:version

            - name: Setup git user
              if: steps.check.outputs.has_changesets == 'true'
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
              working-directory: .

            - name: Create Release PR
              if: steps.check.outputs.has_changesets == 'true'
              uses: peter-evans/create-pull-request@v7
              with:
                  title: "chore: version packages"
                  commit-message: "chore: version packages"
                  branch: changeset-release/main
                  body: |
                      This PR was opened by the Changesets workflow.
                      When merged, the package will be tagged and published to npm.

    # Jobb 2: Publiser kun når version-PR er merget (ingen changesets igjen)
    publish:
        name: Publish to npm
        runs-on: ubuntu-latest
        needs: check
        if: needs.check.outputs.has_changesets == 'false'
        environment: npm-publish

        defaults:
            run:
                working-directory: hviktor-angular

        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"
                  cache-dependency-path: "hviktor-angular/package-lock.json"
                  registry-url: "https://registry.npmjs.org"

            - name: Install dependencies
              run: npm ci

            - name: Setup git user
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
              working-directory: .

            - name: Create git tag
              run: npm run changeset:tag

            - name: Build library
              run: npm run build:lib

            - name: Build schematics
              run: |
                  cd projects/hviktor
                  npm run build

            - name: Publish to npm
              run: |
                  cd dist/hviktor
                  npm publish --access public --provenance
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
